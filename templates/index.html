<!DOCTYPE html>
<html>
<head>
<title>AlgoRhythm Agent</title>
<style>
body {
font-family: Arial;
max-width: 700px;
margin: 40px auto;
}
textarea {
width: 100%;
height: 100px;
}
button {
margin-top: 10px;
padding: 10px;
}
#response {
margin-top: 20px;
background: #f2f2f2;
padding: 10px;
}
</style>
</head>

<body>

<h2>AlgoRhythm Agent</h2>

<textarea id="message" placeholder="Ask something..."></textarea>

<br>

<button onclick="send()">Send</button>

<div id="response"></div>

<script>
async function send() {

const message = document.getElementById("message").value

const response = await fetch("/chat", {
method: "POST",
headers: {
"Content-Type": "application/json"
},
body: JSON.stringify({message})
})

const data = await response.json()

document.getElementById("response").innerText = data.response

}
</script>

</body>
</html>
